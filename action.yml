name: XEngineer PR Review
description: Review a GitHub pull request with XEngineer and publish one PR comment.

branding:
  icon: git-pull-request
  color: blue

inputs:
  pr-url:
    description: GitHub pull request URL. Defaults to the triggering pull_request URL.
    required: false
    default: ""
  github-token:
    description: GitHub token used to read the PR and publish the PR comment.
    required: false
    default: ""
  comment-mode:
    description: Comment target, either conversation or review.
    required: false
    default: conversation
  language:
    description: Report language, either zh or en.
    required: false
    default: zh
  mock-llm:
    description: Use deterministic mock LLM output.
    required: false
    default: "false"
  deepseek-api-key:
    description: DeepSeek API key for real model review.
    required: false
    default: ""
  openai-api-key:
    description: OpenAI API key for real model review.
    required: false
    default: ""
  tavily-api-key:
    description: Tavily API key for optional web search.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install XEngineer
      shell: bash
      run: python -m pip install "${{ github.action_path }}"

    - name: Publish PR review
      shell: bash
      env:
        PR_URL: ${{ inputs.pr-url || github.event.pull_request.html_url || format('https://github.com/{0}/pull/{1}', github.repository, github.event.issue.number) }}
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        XENGINEER_DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        XENGINEER_OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        XENGINEER_TAVILY_API_KEY: ${{ inputs.tavily-api-key }}
      run: |
        if [ -z "${PR_URL}" ]; then
          echo "XEngineer requires a pull request URL. Pass pr-url or run on pull_request." >&2
          exit 2
        fi

        if [ -z "${GITHUB_TOKEN:-}" ]; then
          echo "GitHub token is required. Pass github-token or allow github.token in the workflow." >&2
          exit 2
        fi
        if [ -n "${XENGINEER_DEEPSEEK_API_KEY}" ]; then
          export DEEPSEEK_API_KEY="${XENGINEER_DEEPSEEK_API_KEY}"
        fi
        if [ -n "${XENGINEER_OPENAI_API_KEY}" ]; then
          export OPENAI_API_KEY="${XENGINEER_OPENAI_API_KEY}"
        fi
        if [ -n "${XENGINEER_TAVILY_API_KEY}" ]; then
          export TAVILY_API_KEY="${XENGINEER_TAVILY_API_KEY}"
        fi

        args=(
          python
          -m
          xengineer_pr_review
          --pr-url "${PR_URL}"
          --publish-comment
          --comment-mode "${{ inputs.comment-mode }}"
          --auto-publish
          --language "${{ inputs.language }}"
        )

        if [ "${{ inputs.mock-llm }}" = "true" ]; then
          args+=(--mock-llm)
        fi

        "${args[@]}"
